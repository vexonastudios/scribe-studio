name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.1, v1.1.0, etc.

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_SCRIBE }}
        run: npm run dist:publish
